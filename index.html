<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reproductor DAM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container my-3">

<!-- HEADER -->
<div class="panel d-flex align-items-center gap-3 mb-3">
  <!-- Bloque 1: El Logo -->
  <img src="assets/img/logo.jpg" style="height:60px;">
  
  <!-- Bloque 2: Contenedor de texto (Ocupa todo el espacio restante) -->
  <div class="flex-grow-1 text-center me-5">
    <h4 class="m-0">Reproductor Multimedia DAM</h4>
    <h6 class="m-0">HTML5 + Canvas + SVG</h6>
  </div>
</div>

<div class="row">

<!-- VIDEO ZONE -->
<div class="col-lg-9">

<div class="panel mb-2">
  
  <!-- <video id="video" style="width:100%; border-radius:10px;"></video> -->
  <video id="video" controls style="width:100%; border-radius:10px; border:2px solid #ccc; box-shadow:0 0 10px rgba(0,0,0,0.3);"></video>

  
</div>

<div class="controls mb-2 d-flex gap-2 flex-wrap">
  <button onclick="play()">▶️</button>
  <button onclick="pause()">⏸</button>
  <button onclick="stop()">⏹️</button>
  <button onclick="next()">⏭️</button>
  <button onclick="back()">⏮️</button>
  <button onclick="volUp()">🔊</button>
  <button onclick="volDown()">🔉</button>
  <button onclick="toggleLoop()">🔁</button>
  <!--<label class="text-white">Volumen</label> <input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">-->
  <label class="text-white">Volumen</label> <input type="range" id="volumeBar" min="0" max="1" step="0.1">

</div>

<div class="panel mb-2">
  <input type="range" id="progress" class="form-range">
</div>

<div class="panel">
  <canvas id="canvas" width="500" height="120"></canvas>
  <p>Aquí iría el texto que quisieramos indicar en la web.</p>
</div>

</div>

<!-- RIGHT -->
<div class="col-lg-3">

<div class="panel mb-3">
  <img src="assets/img/Banner.png" style="width:100%;">
</div>

<div class="panel">
  <h6>Playlist</h6>
  <div id="playlist" class="d-flex flex-column gap-2"></div>

</div>

</div>
</div>

<footer class="text-center mt-3 p-3 bg-dark text-white">
  Proyecto bajo licencia CC BY-NC-SA 4.0
</footer>

</div>

<script src="js/app.js"></script>

</body>
</html>
